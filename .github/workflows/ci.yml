# AI-generated (Claude)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  frontend:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check (Svelte + TypeScript)
        run: npm run check

      - name: Vitest unit tests
        run: npm test

  rust:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential libc6-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libudev-dev libusb-1.0-0-dev
          version: 1.0

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo tests
        run: cargo test
        working-directory: src-tauri

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

  visual:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Visual regression tests
        run: npm run test:visual

      - name: Upload diff artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-diffs
          path: test-results/

  android:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust target
        run: rustup target add aarch64-linux-android

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: android

      - name: Cache Gradle packages
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('src-tauri/gen/android/**/*.gradle.kts', 'src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Export ANDROID_NDK_HOME and add NDK tools to PATH
        run: |
          NDK=$ANDROID_SDK_ROOT/ndk/$(ls $ANDROID_SDK_ROOT/ndk | sort -V | tail -1)
          echo "ANDROID_NDK_HOME=$NDK" >> $GITHUB_ENV
          NDK_BIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          echo "$NDK_BIN" >> $GITHUB_PATH
          # NDK r23+ removed arch-prefixed ranlib; OpenSSL's Makefile still uses it
          ln -sf $NDK_BIN/llvm-ranlib $NDK_BIN/aarch64-linux-android-ranlib

      - name: Build Android APK (debug)
        run: npm run tauri android build -- --debug

      - uses: actions/upload-artifact@v7
        with:
          name: android-apk-debug
          path: src-tauri/gen/android/app/build/outputs/apk/arm64-v8a/debug/

  ci-success:
    name: CI Success
    if: always()
    needs: [frontend, rust, visual, android]
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Check all jobs succeeded
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
